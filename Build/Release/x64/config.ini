[load]
# Enable in file dialogs.
folderExt=false

# Do not show popup error messages.
noerror=false

[image]
# Random image mode (requires at least 2 images).
random=false

# Enable per-path custom image mapping (sections at bottom of this file).
custom=false

# Position mode:
# 0=LeftTop 1=RightTop 2=LeftBottom 3=RightBottom
# 4=Center 5=Stretch 6=ZoomFill
# 7=LeftCenter 8=RightCenter 9=TopCenter 10=BottomCenter
posType=3

# Alpha (0-255).
imgAlpha=255

# Optional pixel offsets after positioning.
offsetX=-25
offsetY=10

# Size controls (ignored in posType=5/6):
# imgScale: percent size (100 = original)
# imgWidth/imgHeight: pixel override (0 = auto)
# Priority: width+height > width only > height only > scale
imgScale=25 
imgWidth=0
imgHeight=0

# Custom absolute image folder path (empty = ./Image).
folder=

# Custom path examples (file name only, from Image folder):
# [::{20D04FE0-3AEA-1069-A2D8-08002B30309D}]
# img=myimage.png
#
# [C:\Users\admin\Pictures\Camera Roll]
# img=mypic.png